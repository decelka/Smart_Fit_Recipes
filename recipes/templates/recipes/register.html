{% extends 'recipes/base.html' %}

{% block title %}Реєстрація - Smart Fit Recipes{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; border: 4px solid var(--black); padding: 3rem; background: var(--white);">
    <h2 style="font-size: 3rem; text-transform: uppercase; margin-bottom: 2rem; border-bottom: 3px solid var(--black); padding-bottom: 1rem; line-height: 1;">Реєстрація</h2>
    
    <style>
        .brutal-form input, .brutal-form select { width: 100%; padding: 1rem; border: 3px solid var(--black); margin-bottom: 1.5rem; font-size: 1.1rem; box-sizing: border-box; }
        .brutal-form label { font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .brutal-form .helptext { font-size: 0.8rem; color: #666; display: block; margin-top: -1rem; margin-bottom: 1rem; }
        .brutal-form ul { list-style: none; color: red; font-size: 0.9rem; margin-bottom: 1rem; }
        .brutal-btn { background: var(--black); color: var(--white); border: 3px solid var(--black); padding: 1rem; font-size: 1.2rem; text-transform: uppercase; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .brutal-btn:hover { background: var(--white); color: var(--black); }
    </style>

    <form method="POST" class="brutal-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="brutal-btn">Створити акаунт</button>
    </form>
    <p style="margin-top: 1.5rem; text-align: center; font-weight: bold;">Вже є акаунт? <a href="{% url 'login' %}" style="color: var(--black);">Увійти</a></p>
</div>
{% endblock %}
