{% extends 'recipes/base.html' %}

{% block title %}Вхід - Smart Fit Recipes{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; border: 4px solid var(--black); padding: 3rem; background: var(--white);">
    <h2 style="font-size: 3rem; text-transform: uppercase; margin-bottom: 2rem; border-bottom: 3px solid var(--black); padding-bottom: 1rem; line-height: 1;">Вхід</h2>
    
    <style>
        .brutal-form input { width: 100%; padding: 1rem; border: 3px solid var(--black); margin-bottom: 1.5rem; font-size: 1.1rem; box-sizing: border-box; }
        .brutal-form label { font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .brutal-btn { background: var(--black); color: var(--white); border: 3px solid var(--black); padding: 1rem; font-size: 1.2rem; text-transform: uppercase; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .brutal-btn:hover { background: var(--white); color: var(--black); }
    </style>

    <form method="POST" class="brutal-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="brutal-btn">Увійти</button>
    </form>

    <div style="margin-top: 2rem; text-align: center; border-top: 2px solid var(--black); padding-top: 1.5rem;">
        <a href="{% url 'password_reset' %}" style="display: block; color: var(--black); font-weight: bold; text-decoration: none; margin-bottom: 1rem; text-transform: uppercase; font-size: 0.9rem;">
            Забули пароль?
        </a>
                
        <div style="font-size: 1rem; color: var(--black);">
            Немає акаунту? 
            <a href="{% url 'register' %}" style="font-weight: 900; color: var(--black); text-decoration: underline; text-transform: uppercase; margin-left: 5px;">
                Створити
            </a>
        </div>
    </div>
</div>
{% endblock %}
