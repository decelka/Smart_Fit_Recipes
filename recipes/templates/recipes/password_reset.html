{% extends 'recipes/base.html' %}
{% block content %}
<div style="max-width: 500px; margin: 50px auto; border: 3px solid #000; padding: 30px;">
    <h2 style="font-size: 2rem; font-weight: 900; text-transform: uppercase; margin-bottom: 20px;">Відновлення пароля</h2>
    <p style="margin-bottom: 20px;">Введи свою пошту, і ми надішлемо тобі посилання для скидання пароля.</p>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width: 100%; background: #000; color: #fff; border: none; padding: 15px; font-size: 1.2rem; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 10px;">Відправити лист</button>
    </form>
</div>
{% endblock %}
